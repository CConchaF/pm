name: AQI Talca

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-aqi:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Install packages
        run: |
          Rscript -e "install.packages(c('httr','jsonlite','dplyr','readr'), repos='https://cloud.r-project.org')"

      - name: Run AQI script
        env:
          AQICN_TOKEN: ${{ secrets.AQICN_TOKEN }}
        run: Rscript aqi_talca.R

      - name: Commit updated data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/aqi_talca_log.csv
          git commit -m "Update AQI data" || echo "No changes"
          git push
